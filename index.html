<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة تخمين الكلمة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-pattern"></div>

  <main class="container">

    <header class="game-header">
      <div class="header-accent"></div>
      <h1 class="game-title">خمِّن الكلمة</h1>
      <p class="game-subtitle">اقرأ التلميح واملأ الحروف الناقصة</p>
    </header>

    <!-- Score Bar -->
    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">النقاط</span>
        <span id="score-value" class="score-value">0</span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">الكلمة</span>
        <span id="word-counter" class="score-value">1 / <span id="total-words">—</span></span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">المستوى</span>
        <span id="level-badge" class="level-badge">—</span>
      </div>
    </div>

    <div class="game-card">

      <!-- Clue Section -->
      <section class="clue-section" aria-label="التلميح">
        <span class="clue-label">التلميح</span>
        <p id="clue-text" class="clue-text"></p>
      </section>

      <div class="divider"></div>

      <!-- Letter Grid -->
      <section class="word-section" aria-label="الكلمة">
        <p class="word-instruction">رتِّب الحروف وأكمل الكلمة</p>
        <div id="letter-grid" class="letter-grid" role="group" aria-label="خانات الكلمة"></div>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button id="check-btn" class="btn-check" onclick="checkAnswer()" aria-label="تحقق من الإجابة">
          <span class="btn-text">تحقق</span>
          <span class="btn-icon" aria-hidden="true">←</span>
        </button>
        <button id="next-btn" class="btn-next" onclick="nextWord()" aria-label="الكلمة التالية" style="display:none;">
          <span class="btn-text">التالي</span>
          <span class="btn-icon" aria-hidden="true">»</span>
        </button>
        <button id="reset-btn" class="btn-reset" onclick="resetGame()" aria-label="إعادة المحاولة">
          إعادة
        </button>
      </div>

      <!-- Feedback -->
      <div id="feedback" class="feedback" role="alert" aria-live="polite"></div>

    </div>

    <footer class="game-footer">
      <p>اضغط <kbd>Enter</kbd> للتحقق من إجابتك</p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
